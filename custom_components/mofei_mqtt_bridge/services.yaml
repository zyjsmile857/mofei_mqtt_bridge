send_message:
  name: Send message
  description: Publish a payload through a configured bridge, using the discovered ACS topic when available.
  fields:
    mac:
      name: MAC
      description: Device MAC used to match the bridge entry.
      required: true
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:
    payload:
      name: Payload
      description: MQTT payload to send.
      required: true
      example: '{"key":"ok"}'
      selector:
        text:
